<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="icon" href="data:image/svg+xml,{{ favicon }}">
  <link rel="shortcut icon" href="data:image/svg+xml,{{ favicon }}">
  <script>
  (function() {
    var stored = localStorage.getItem('ghrm-theme');
    var system = window.matchMedia('(prefers-color-scheme: dark)').matches
      ? 'dark'
      : 'light';
    document.documentElement.setAttribute('data-theme', stored || system);
  })();
  </script>
  <link rel="stylesheet" href="/_ghrm/css/bundle.css">
  <link rel="stylesheet" href="/vendor/katex/katex.min.css">
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css">
</head>
<body data-live-reload="{{ live_reload }}">
{{ icons }}  <header class="ghrm-topbar">
    <div class="ghrm-topbar-inner">
      <div class="ghrm-topbar-spacer" aria-hidden="true"></div>
      <div class="ghrm-topbar-controls">
        <div class="ghrm-scope-switch" aria-label="Explorer scope">
          <button type="button" class="ghrm-scope-option is-active" aria-pressed="true">*.md</button>
          <button type="button" class="ghrm-scope-option" aria-pressed="false">*</button>
          <button type="button" class="ghrm-scope-option" aria-pressed="false">**</button>
        </div>
        <button id="theme-toggle" type="button" aria-label="Toggle theme">
          <svg class="icon-sun" aria-hidden="true" focusable="false">
            <use href="#ghrm-icon-sun"></use>
          </svg>
          <svg class="icon-moon" aria-hidden="true" focusable="false">
            <use href="#ghrm-icon-moon"></use>
          </svg>
        </button>
      </div>
    </div>
  </header>
{{ body }}  <script defer src="/vendor/mermaid.js"></script>
  <script defer src="/vendor/svg-pan-zoom.min.js"></script>
  <script defer src="/vendor/katex/katex.min.js"></script>
  <script defer src="/vendor/katex/auto-render.min.js"></script>
  <script defer src="/vendor/leaflet/leaflet.js"></script>
  <script defer src="/vendor/topojson-client.min.js"></script>
  <script defer src="/vendor/highlightjs/highlight.min.js"></script>
  <script type="module" src="/js/preview.js"></script>
  <script>
  (function() {
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('ghrm-theme', next);
        document.dispatchEvent(
          new CustomEvent('ghrm:themechange', { detail: { theme: next } })
        );
      });

      if (document.body.dataset.liveReload !== '1') {
        return;
      }

      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      var url = proto + '//' + location.host + '/_ghrm/ws';
      function connect() {
        var ws = new WebSocket(url);
        ws.onmessage = function(ev) { if (ev.data === 'reload') location.reload(); };
        ws.onclose = function() { setTimeout(connect, 1000); };
      }
      connect();
    });
  })();
  </script>
</body>
</html>
