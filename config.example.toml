# ~/.config/ghrm/config.toml or --config

port = 1331
bind = "127.0.0.1"
open = true

[auth]
# username = "admin"
# password = "ghrm"

[walk]
hidden = false
no_ignore = false
no_excludes = false
exclude_names = [
  "node_modules",
  "__pycache__",
  "target",
  ".venv",
  ".env",
  ".pytest_cache",
  ".ruff_cache",
  ".uv-cache",
  ".ipynb_checkpoints",
]

[walk.filter]
enabled = false
default_group = "docs"

[walk.filter.groups.docs]
label = "Docs"
globs = ["*.md", "*.mdx", "*.txt", "*.rst"]

[search]
max_rows = 1000
