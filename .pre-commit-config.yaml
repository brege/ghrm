fail_fast: true

repos:
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check --locked
        language: system
        pass_filenames: false
        files: ^(src/|lua/|assets/config\.json|Cargo\.toml|Cargo\.lock|clippy\.toml|rustfmt\.toml)

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --check
        language: system
        pass_filenames: false
        files: ^(src/|lua/|assets/config\.json|Cargo\.toml|Cargo\.lock|clippy\.toml|rustfmt\.toml)

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --locked -- -D warnings
        language: system
        pass_filenames: false
        files: ^(src/|lua/|assets/config\.json|Cargo\.toml|Cargo\.lock|clippy\.toml|rustfmt\.toml)
