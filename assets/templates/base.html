<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="icon" href="data:image/svg+xml,{{ favicon }}">
  <link rel="shortcut icon" href="data:image/svg+xml,{{ favicon }}">
  <script>
  (function() {
    var stored = localStorage.getItem('ghrm-theme');
    var system = window.matchMedia('(prefers-color-scheme: dark)').matches
      ? 'dark'
      : 'light';
    document.documentElement.setAttribute('data-theme', stored || system);
  })();
  </script>
  <link rel="stylesheet" href="/vendor/github-markdown.css">
  <link rel="stylesheet" href="/_ghrm/assets/css/admonitions.css">
  <link rel="stylesheet" href="/_ghrm/assets/css/page.css">
  <link rel="stylesheet" href="/_ghrm/assets/css/features.css">
{% if has_math %}  <link rel="stylesheet" href="/vendor/katex/katex.min.css">
{% endif %}{% if has_map %}  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css">
{% endif %}</head>
<body
  data-default-show-hidden="{% if default_show_hidden %}1{% else %}0{% endif %}"
  data-default-show-excludes="{% if default_show_excludes %}1{% else %}0{% endif %}"
  data-default-filter-ext="{% if default_filter_ext %}1{% else %}0{% endif %}"
  data-can-toggle-excludes="{% if can_toggle_excludes %}1{% else %}0{% endif %}">
{% include "fragments/icons.html" %}  <header class="ghrm-topbar">
    <div class="ghrm-topbar-inner">
{{ source|safe }}      <div id="ghrm-path-search" class="ghrm-path-search" role="search" hidden>
        <button id="ghrm-search-mode" type="button" class="ghrm-search-mode" title="Switch search mode" aria-label="Switch search mode">
          <svg class="icon-path" aria-hidden="true" focusable="false"><use href="#ghrm-icon-list"></use></svg>
          <svg class="icon-content" aria-hidden="true" focusable="false"><use href="#ghrm-icon-code"></use></svg>
        </button>
        <input id="ghrm-path-search-input" class="ghrm-path-search-input" type="search" placeholder="Search paths" aria-label="Search paths">
        <button id="ghrm-path-search-toggle" type="button" aria-expanded="false" aria-label="Search paths" title="Search paths">
          <svg aria-hidden="true" focusable="false">
            <use href="#ghrm-icon-search"></use>
          </svg>
        </button>
        <span id="ghrm-path-search-status" class="ghrm-path-search-status" aria-live="polite"></span>
      </div>
      <button id="doc-chrome-toggle" type="button" hidden aria-label="Hide document wrapper" title="Hide document wrapper">
        <svg class="icon-framed" aria-hidden="true" focusable="false">
          <use href="#ghrm-icon-doc-framed"></use>
        </svg>
        <svg class="icon-flat" aria-hidden="true" focusable="false">
          <use href="#ghrm-icon-doc-flat"></use>
        </svg>
      </button>
      <button id="theme-toggle" type="button" aria-label="Toggle theme">
        <svg class="icon-sun" aria-hidden="true" focusable="false">
          <use href="#ghrm-icon-sun"></use>
        </svg>
        <svg class="icon-moon" aria-hidden="true" focusable="false">
          <use href="#ghrm-icon-moon"></use>
        </svg>
      </button>
{% if show_logout %}      <a id="ghrm-logout" href="/_ghrm/logout" aria-label="Log out" title="Log out">
        <svg aria-hidden="true" focusable="false">
          <use href="#ghrm-icon-logout"></use>
        </svg>
      </a>
{% endif %}
    </div>
  </header>
  <nav id="ghrm-toc-panel" class="ghrm-toc-panel" hidden aria-label="Table of contents"></nav>
{{ body|safe }}{% if has_mermaid %}  <script defer src="/vendor/mermaid.js"></script>
  <script defer src="/vendor/svg-pan-zoom.min.js"></script>{% endif %}
{% if has_math %}<script defer src="/vendor/katex/katex.min.js"></script>
  <script defer src="/vendor/katex/auto-render.min.js"></script>{% endif %}
{% if has_map %}<script defer src="/vendor/leaflet/leaflet.js"></script>
  <script defer src="/vendor/topojson-client.min.js"></script>{% endif %}
  <script defer src="/vendor/highlightjs/highlight.min.js"></script>
  <script type="module" src="/_ghrm/assets/js/preview.js"></script>
  <script type="module" src="/_ghrm/assets/js/app.js"></script>
</body>
</html>
