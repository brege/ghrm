<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="icon" href="data:image/svg+xml,{{ favicon }}">
  <link rel="shortcut icon" href="data:image/svg+xml,{{ favicon }}">
  <script>
  (function() {
    var stored = localStorage.getItem('ghrm-theme');
    var system = window.matchMedia('(prefers-color-scheme: dark)').matches
      ? 'dark'
      : 'light';
    document.documentElement.setAttribute('data-theme', stored || system);
  })();
  </script>
  <link rel="stylesheet" href="/_ghrm/assets/css/github-markdown.css">
  <link rel="stylesheet" href="/_ghrm/assets/css/admonitions.css">
  <link rel="stylesheet" href="/_ghrm/assets/css/page.css">
  <link rel="stylesheet" href="/_ghrm/assets/css/features.css">
  <link rel="stylesheet" href="/vendor/katex/katex.min.css">
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css">
</head>
<body>
{{ icons }}  <header class="ghrm-topbar">
    <div class="ghrm-topbar-inner">
      <div class="ghrm-topbar-spacer" aria-hidden="true"></div>
      <div class="ghrm-topbar-controls">
        <div class="ghrm-scope-switch" aria-label="Preview scope" role="group">
          <button class="ghrm-scope-option is-active" type="button" data-scope="md" aria-pressed="true" aria-label="Markdown files">
            <span class="ghrm-scope-combo" aria-hidden="true">
              <svg class="ghrm-scope-glyph" aria-hidden="true" focusable="false">
                <use href="#ghrm-icon-asterisk"></use>
              </svg>
              <span class="ghrm-scope-text">.md</span>
            </span>
          </button>
          <button class="ghrm-scope-option" type="button" data-scope="files" aria-pressed="false" aria-label="Files">
            <svg class="ghrm-scope-glyph" aria-hidden="true" focusable="false">
              <use href="#ghrm-icon-asterisk"></use>
            </svg>
          </button>
          <button class="ghrm-scope-option" type="button" data-scope="all" aria-pressed="false" aria-label="Files including dotfiles">
            <span class="ghrm-scope-double" aria-hidden="true">
              <svg class="ghrm-scope-glyph" focusable="false">
                <use href="#ghrm-icon-asterisk"></use>
              </svg>
              <svg class="ghrm-scope-glyph" focusable="false">
                <use href="#ghrm-icon-asterisk"></use>
              </svg>
            </span>
          </button>
        </div>
        <button id="theme-toggle" type="button" aria-label="Toggle theme">
          <svg class="icon-sun" aria-hidden="true" focusable="false">
            <use href="#ghrm-icon-sun"></use>
          </svg>
          <svg class="icon-moon" aria-hidden="true" focusable="false">
            <use href="#ghrm-icon-moon"></use>
          </svg>
        </button>
      </div>
    </div>
  </header>
{{ body }}  <script defer src="/vendor/mermaid.js"></script>
  <script defer src="/vendor/svg-pan-zoom.min.js"></script>
  <script defer src="/vendor/katex/katex.min.js"></script>
  <script defer src="/vendor/katex/auto-render.min.js"></script>
  <script defer src="/vendor/leaflet/leaflet.js"></script>
  <script defer src="/vendor/topojson-client.min.js"></script>
  <script defer src="/vendor/highlightjs/highlight.min.js"></script>
  <script type="module" src="/_ghrm/assets/js/preview.js"></script>
  <script type="module" src="/_ghrm/assets/js/app.js"></script>
</body>
</html>
