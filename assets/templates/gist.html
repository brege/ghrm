<article class="markdown-body" hx-history-elt data-ghrm-features="">
  <section class="ghrm-page-shell" data-ghrm-gist>
    <div class="ghrm-explorer-header">
      <nav class="ghrm-breadcrumbs" aria-label="Path">
        <span class="ghrm-crumb-current">gist</span>
      </nav>
      <div class="ghrm-header-actions">
{% if has_paste %}        <a class="ghrm-file-link" href="{{ raw_href }}" target="_blank" rel="noopener noreferrer" data-ghrm-native="1" hx-boost="false" aria-label="Open raw paste" title="Open raw paste">Raw</a>
{% endif %}      </div>
    </div>
    <div class="ghrm-page-content">
{% if has_paste %}      <p class="ghrm-gist-current"><code>{{ paste_id }}</code></p>
      <div class="ghrm-file-pane ghrm-raw-pane">
{{ raw_html|safe }}
      </div>
{% else %}      <p class="ghrm-nav-empty">No paste yet.</p>
{% endif %}    </div>
  </section>
</article>
