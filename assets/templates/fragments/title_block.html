  <div class="ghrm-explorer-header">
    <nav class="ghrm-breadcrumbs" aria-label="Path">{{ crumbs }}</nav>
    <div class="ghrm-header-actions">
      <div class="ghrm-view-menu-shell">
        <button id="ghrm-view-menu-toggle" class="ghrm-view-menu-toggle" type="button" aria-expanded="false" aria-haspopup="menu" aria-label="Explorer options" title="Explorer options">
          <svg aria-hidden="true" focusable="false">
            <use href="#ghrm-icon-chevron-down"></use>
          </svg>
        </button>
        <div id="ghrm-view-menu" class="ghrm-view-menu" role="menu" aria-label="Explorer options" hidden>
          <button class="ghrm-view-option" type="button" data-view-toggle="hidden" role="menuitemcheckbox" aria-checked="false" title="Set by -H">
            <svg class="ghrm-view-option-check" aria-hidden="true" focusable="false">
              <use href="#ghrm-icon-check"></use>
            </svg>
            <span class="ghrm-view-option-label">Show hidden</span>
          </button>
          <button class="ghrm-view-option" type="button" data-view-toggle="excludes" role="menuitemcheckbox" aria-checked="false" title="Set by -E"{{ excludes_hidden }}>
            <svg class="ghrm-view-option-check" aria-hidden="true" focusable="false">
              <use href="#ghrm-icon-check"></use>
            </svg>
            <span class="ghrm-view-option-label">Show excludes</span>
          </button>
          <button class="ghrm-view-option" type="button" data-view-toggle="filter" role="menuitemcheckbox" aria-checked="false" title="Customize with -e &lt;file extension&gt;">
            <svg class="ghrm-view-option-check" aria-hidden="true" focusable="false">
              <use href="#ghrm-icon-check"></use>
            </svg>
            <span class="ghrm-view-option-label">Filter filetype</span>
            <span class="ghrm-view-option-detail">{{ filter_label }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
