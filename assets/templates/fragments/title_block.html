  <div class="ghrm-explorer-header">
    <nav class="ghrm-breadcrumbs" aria-label="Path">{{ crumbs }}</nav>
    <div class="ghrm-header-actions">
      <div class="ghrm-scope-switch" aria-label="Preview scope" role="group">
        <button class="ghrm-scope-option" type="button" data-scope="filter" aria-pressed="false" aria-label="Filtered files" title="Filtered files">
          <span class="ghrm-scope-combo" aria-hidden="true">
            <span class="ghrm-scope-text">-e</span>
          </span>
        </button>
        <button class="ghrm-scope-option is-active" type="button" data-scope="files" aria-pressed="true" aria-label="Files" title="Files">
          <svg class="ghrm-scope-glyph" aria-hidden="true" focusable="false">
            <use href="#ghrm-icon-asterisk"></use>
          </svg>
        </button>
        <button class="ghrm-scope-option" type="button" data-scope="all" aria-pressed="false" aria-label="Files including dotfiles" title="All files including hidden">
          <span class="ghrm-scope-double" aria-hidden="true">
            <svg class="ghrm-scope-glyph" focusable="false">
              <use href="#ghrm-icon-asterisk"></use>
            </svg>
            <svg class="ghrm-scope-glyph" focusable="false">
              <use href="#ghrm-icon-asterisk"></use>
            </svg>
          </span>
        </button>
      </div>
    </div>
  </div>
