<section id="ghrm-about-peek" class="ghrm-about-peek"{% if oob %} hx-swap-oob="true"{% endif %} hidden>
  <div class="ghrm-about-peek-inner">
    <div class="ghrm-about-main">
      <div class="ghrm-about-source" aria-label="Current source">
        <div class="ghrm-about-heading">Current Source</div>
        <dl>
          <div class="ghrm-about-source-row">
            <dt>{{ source.label }}</dt>
            <dd title="{{ source.title }}">
{% if let Some(href) = source.href %}            <a href="{{ href }}" target="_blank" rel="noopener noreferrer">{{ source.value }}</a>
{% else %}            <span>{{ source.value }}</span>
{% endif %}            </dd>
          </div>
        </dl>
      </div>
      <div class="ghrm-runtime-paths" aria-label="Runtime paths">
        <div class="ghrm-about-heading">Runtime Paths</div>
        <dl>
{% for item in runtime_paths %}          <div class="ghrm-runtime-path">
            <dt>{{ item.label }}</dt>
            <dd title="{{ item.value }}">{{ item.value }}</dd>
          </div>
{% endfor %}        </dl>
      </div>
    </div>
    <div class="ghrm-about-app" aria-label="ghrm app">
      <img class="ghrm-about-stamp" src="/_ghrm/assets/img/favicon.svg" alt="" aria-hidden="true">
      <div class="ghrm-about-heading">ghrm</div>
      <div class="ghrm-about-links">
        <a class="ghrm-about-project" href="{{ project_href }}" target="_blank" rel="noopener noreferrer">
          <svg aria-hidden="true">
            <use href="#ghrm-icon-github"></use>
          </svg>
          <span>brege/ghrm</span>
        </a>
        <a class="ghrm-about-project" href="{{ project_release_href }}" target="_blank" rel="noopener noreferrer">
          <svg aria-hidden="true">
            <use href="#ghrm-icon-fork"></use>
          </svg>
          <span>v{{ project_version }}</span>
        </a>
      </div>
    </div>
  </div>
</section>
