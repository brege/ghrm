<article class="markdown-body" hx-history-elt data-ghrm-features="{{ features }}">
  <section class="ghrm-page-shell" {{ view_attrs|safe }}>
    <div class="ghrm-explorer-header">
      <nav class="ghrm-breadcrumbs" aria-label="Path">{{ crumbs|safe }}</nav>
      <div class="ghrm-header-actions">
        <button type="button" class="ghrm-toc-btn" data-ghrm-toc-btn="page" hidden title="Table of contents" aria-label="Table of contents">
          <svg aria-hidden="true" focusable="false">
            <use href="#ghrm-icon-list"></use>
          </svg>
        </button>
      </div>
    </div>
    <div class="ghrm-page-content">
      <div class="ghrm-file-pane" data-ghrm-preview-pane{% if preview_hidden %} hidden{% endif %}>
{{ preview_html|safe }}
      </div>
      <div class="ghrm-file-pane ghrm-raw-pane" data-ghrm-raw-pane{% if raw_hidden %} hidden{% endif %}>
{{ raw_html|safe }}
      </div>
    </div>
  </section>
</article>
