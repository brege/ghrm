<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Loading Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Asset Loading Test</h1>
  <p>If assets load correctly, this page should have:</p>
  <ul>
    <li id="css-check" class="styled">CSS: styled text (blue, sans-serif)</li>
    <li id="js-check">JS: <span id="js-status">NOT LOADED</span></li>
    <li id="img-check">PNG: <img src="icon.png" alt="test icon" width="16" height="16"> (small green square)</li>
  </ul>
  <div class="box">
    <p>This box should have a border and padding if CSS loaded.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
